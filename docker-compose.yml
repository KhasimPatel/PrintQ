
services:
  # ── Backend ──
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: printq-backend
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
    ports:
      - "5000:5000"
    networks:
      - printq-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Frontend ──
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: printq-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - printq-network

networks:
  printq-network:
    driver: bridge